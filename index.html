<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM OBS Overlay (Multi-Match)</title>
    <style>
        /* Das Design bleibt exakt gleich */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            background-color: #000000;
            border-radius: 25px;
            height: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }

        .scoreboard::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 5%;
            width: 90%;
            height: 3px;
            background: linear-gradient(90deg, rgba(255,100,100,1) 0%, rgba(255,200,200,1) 30%, rgba(0,0,0,0) 45%, rgba(0,0,0,0) 55%, rgba(150,255,150,1) 70%, rgba(200,150,255,1) 100%);
            border-radius: 5px;
        }

        .time-box {
            background-color: #ffffff;
            color: #000000;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-radius: 25px 10px 10px 25px;
            font-size: 28px;
            font-weight: bold;
        }

        .team-container {
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        .team-name {
            color: #ffffff;
            font-size: 28px;
            text-transform: uppercase;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.blue { background-color: #88b7ff; }
        .dot.dark { background-color: #333333; border: 1px solid #666; }

        .flag {
            width: 40px;
            height: 26px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #333;
        }

        .score-box {
            background-color: #90f3c5;
            color: #000;
            font-size: 32px;
            padding: 5px 15px;
            border-radius: 12px;
            margin: 0 5px;
            z-index: 2;
        }

        .center-logo {
            background-color: #ffffff;
            height: 70px;
            width: 50px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 10px;
            z-index: 3;
            margin: 0 -5px;
        }
        
        .center-logo span { font-size: 24px; line-height: 1; }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="time-box" id="match-time">00:00</div>
        
        <div class="team-container">
            <img class="flag" id="team1-flag" src="https://via.placeholder.com/40x26/333/FFF?text=?" alt="Team 1">
            <div class="dot blue"></div>
            <div class="team-name" id="team1-name">TBA</div>
        </div>

        <div class="score-box" id="team1-score">0</div>
        <div class="center-logo"><span>🏆</span>FIFA</div>
        <div class="score-box" id="team2-score">0</div>

        <div class="team-container">
            <div class="team-name" id="team2-name">TBA</div>
            <div class="dot dark"></div>
            <img class="flag" id="team2-flag" src="https://via.placeholder.com/40x26/333/FFF?text=?" alt="Team 2">
        </div>
    </div>

    <script>
        // Liest das Wunsch-Team aus der URL (z.B. ?team=FRA)
        const urlParams = new URLSearchParams(window.location.search);
        const targetTeam = urlParams.get('team') ? urlParams.get('team').toUpperCase() : null;

        async function fetchLiveScore() {
            try {
                const response = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard');
                const data = await response.json();
                
                if(data.events && data.events.length > 0) {
                    let match = data.events[0]; // Standardmäßig das erste Spiel nehmen

                    // Wenn ein Wunsch-Team angegeben wurde, suchen wir gezielt danach
                    if (targetTeam) {
                        const foundMatch = data.events.find(event => {
                            const home = event.competitions[0].competitors[0].team.abbreviation.toUpperCase();
                            const away = event.competitions[0].competitors[1].team.abbreviation.toUpperCase();
                            return home === targetTeam || away === targetTeam;
                        });
                        
                        if (foundMatch) {
                            match = foundMatch;
                        } else {
                            console.log(`Spiel mit Team ${targetTeam} wurde aktuell nicht live gefunden. Zeige Standardspiel.`);
                        }
                    }

                    const status = match.status;
                    const homeTeam = match.competitions[0].competitors[0];
                    const awayTeam = match.competitions[0].competitors[1];

                    // Daten in das HTML einfügen
                    document.getElementById('match-time').innerText = status.displayClock || "00:00";
                    document.getElementById('team1-name').innerText = homeTeam.team.abbreviation;
                    document.getElementById('team1-score').innerText = homeTeam.score;
                    document.getElementById('team1-flag').src = homeTeam.team.logo;

                    document.getElementById('team2-name').innerText = awayTeam.team.abbreviation;
                    document.getElementById('team2-score').innerText = awayTeam.score;
                    document.getElementById('team2-flag').src = awayTeam.team.logo;
                }
            } catch (error) {
                console.error("Fehler beim Abrufen der Live-Daten:", error);
            }
        }

        fetchLiveScore();
        setInterval(fetchLiveScore, 30000);
    </script>
</body>
</html>
